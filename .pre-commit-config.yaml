repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: mixed-line-ending
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: npx --no-install biome check --write --no-errors-on-unmatched
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css]
        pass_filenames: true
      - id: prettier-html
        name: prettier (html)
        entry: npx --no-install prettier --write
        language: system
        files: \.html$
        pass_filenames: true
